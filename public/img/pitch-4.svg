<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 116" fill="none" role="img" aria-hidden="true">
  <!-- Minigolf curved lane with a little hill + gold flag. Muted. -->
  <!-- felt body (fat rounded stroke) -->
  <path d="M30 92 Q34 46 94 46 Q152 46 152 78" stroke="#ffffff" stroke-opacity="0.06"
        stroke-width="30" stroke-linecap="round" fill="none"/>
  <!-- centre line -->
  <path d="M30 92 Q34 46 94 46 Q152 46 152 78" stroke="#ffffff" stroke-opacity="0.16"
        stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1 8" fill="none"/>
  <!-- hill bump -->
  <ellipse cx="96" cy="40" rx="13" ry="5.5" fill="#ffffff" fill-opacity="0.1"
           stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- tee + ball -->
  <circle cx="30" cy="92" r="8" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.4"/>
  <circle cx="30" cy="92" r="4.5" fill="#ffffff" fill-opacity="0.55"/>
  <!-- cup + flag -->
  <ellipse cx="152" cy="78" rx="5.5" ry="4.4" fill="#0b1d13" fill-opacity="0.22"/>
  <rect x="151" y="60" width="2.2" height="18" rx="1.1" fill="#ffffff" fill-opacity="0.24"/>
  <path d="M153.2 61 l14 4 -14 4 z" fill="#f2c14e" fill-opacity="0.36"/>
</svg>
