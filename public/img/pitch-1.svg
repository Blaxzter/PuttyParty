<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 184 96" fill="none" role="img" aria-hidden="true">
  <!-- Minigolf lane: bordered felt track, tee + ball, windmill obstacle, cup with flag.
       Muted / semi-transparent so the turf shows through. -->
  <!-- felt lane with rail border -->
  <rect x="10" y="26" width="164" height="44" rx="22"
        fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2.4"/>
  <!-- centre line of the lane -->
  <path d="M40 50 L150 50" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.6"
        stroke-linecap="round" stroke-dasharray="1 7"/>
  <!-- tee ring + ball -->
  <circle cx="34" cy="48" r="8" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.4"/>
  <circle cx="34" cy="48" r="4.5" fill="#ffffff" fill-opacity="0.55"/>
  <!-- windmill obstacle -->
  <path d="M70 42 L79 32 L88 42 Z" fill="#ffffff" fill-opacity="0.14"/>
  <rect x="72" y="42" width="14" height="16" rx="2"
        fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.2"/>
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="2.2" stroke-linecap="round">
    <path d="M79 40 L67 31"/><path d="M79 40 L91 31"/>
    <path d="M79 40 L67 49"/><path d="M79 40 L91 49"/>
  </g>
  <circle cx="79" cy="40" r="2" fill="#ffffff" fill-opacity="0.3"/>
  <!-- cup + flag -->
  <ellipse cx="150" cy="49" rx="6" ry="4.6" fill="#0b1d13" fill-opacity="0.22"/>
  <rect x="149" y="30" width="2.2" height="19" rx="1.1" fill="#ffffff" fill-opacity="0.24"/>
  <path d="M151.2 31 l15 4.5 -15 4.5 z" fill="#e2533b" fill-opacity="0.34"/>
</svg>
